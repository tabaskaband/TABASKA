<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Control</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Light Control</h1>

<input type="color" id="colorPicker">

<div class="buttons">
  <button onclick="setColor('#ff0000')">赤</button>
  <button onclick="setColor('#00ff00')">緑</button>
  <button onclick="setColor('#0000ff')">青</button>
  <button onclick="setColor('#ffffff')">白</button>
  <button onclick="setColor('#000000')">黒</button>
  <button onclick="startShow()">演出スタート</button>
<button onclick="stopShow()">ストップ</button>
</div>

<div class="buttons">
  <button onclick="flash()">フラッシュ</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io(https://tabaskaband.github.io/TABASKA/);

function setColor(color) {
  socket.emit("changeColor", color);
}

function flash() {
  socket.emit("flash");
}








// 🎬 自動演出



  const scenes = [
  
    { time: 5000, action: () => setColor("#0000ff") }, // 青
    { time: 10000, action: () => setColor("#00ff00") }, // 緑
    { time: 15000, action: () => setColor("#ffff00") },   // 黄
    { time: 20000, action: () => setColor("#ffa500") }, // オレンジ
    { time: 25000, action: () => setColor("#ff0000") },   // 赤
    { time: 30000, action: () => setColor("#9400d3") },   // 紫




];




let timers = [];
let isRunning = false;

// ▶️ 開始（ループ）
function startShow() {
  if (isRunning) return;
  isRunning = true;

  runScenes();
}

// シーン実行
function runScenes() {
  scenes.forEach(scene => {
    const timer = setTimeout(() => {
      if (isRunning) scene.action();
    }, scene.time);

    timers.push(timer);
  });

  // 最後まで行ったらループ
  const totalTime = scenes[scenes.length - 1].time;

  const loopTimer = setTimeout(() => {
    if (isRunning) runScenes();
  }, totalTime);

  timers.push(loopTimer);
}

// ⏹ 停止
function stopShow() {
  isRunning = false;

  timers.forEach(timer => clearTimeout(timer));
  timers = [];

  console.log("演出停止");
}





document.getElementById("colorPicker").addEventListener("input", (e) => {
  setColor(e.target.value);
});
</script>

</body>
</html>
