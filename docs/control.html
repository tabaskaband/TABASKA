<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Control</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: sans-serif;
  padding: 20px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  font-size: 16px;
}

.buttons {
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>🎛 Light Control</h1>

<input type="color" id="colorPicker">

<div class="buttons">
  <button onclick="setColor('#ff0000')">赤</button>
  <button onclick="setColor('#00ff00')">緑</button>
  <button onclick="setColor('#0000ff')">青</button>
  <button onclick="setColor('#ffffff')">白</button>
  <button onclick="setColor('#000000')">黒</button>
</div>

<div class="buttons">
  <button onclick="startShow()">▶ 演出スタート</button>
  <button onclick="stopShow()">■ ストップ</button>
</div>

<div class="buttons">
  <button onclick="flash()">⚡ フラッシュ</button>
</div>

<!-- Socket.IO CDN（重要） -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io("https://tabaska.onrender.com");

// 接続確認
socket.on("connect", () => {
  console.log("connected:", socket.id);
});

// 色送信
function setColor(color) {
  socket.emit("changeColor", color);
}

// フラッシュ
function flash() {
  socket.emit("flash");
}

/* =========================
   🎬 自動演出
========================= */

const scenes = [
  { time: 0, action: () => setColor("#ff0000") },
  { time: 5000, action: () => setColor("#0000ff") },
  { time: 10000, action: () => setColor("#00ff00") },
  { time: 15000, action: () => setColor("#ffff00") },
  { time: 20000, action: () => setColor("#ffa500") },
  { time: 25000, action: () => setColor("#9400d3") }
];

let timers = [];
let isRunning = false;

function startShow() {
  if (isRunning) return;
  isRunning = true;
  runScenes();
}

function runScenes() {
  scenes.forEach(scene => {
    const t = setTimeout(() => {
      if (isRunning) scene.action();
    }, scene.time);
    timers.push(t);
  });

  const loopTime = scenes[scenes.length - 1].time + 5000;

  const loop = setTimeout(() => {
    if (isRunning) runScenes();
  }, loopTime);

  timers.push(loop);
}

function stopShow() {
  isRunning = false;
  timers.forEach(t => clearTimeout(t));
  timers = [];
}

/* カラーピッカー */
document.getElementById("colorPicker").addEventListener("input", (e) => {
  setColor(e.target.value);
});
</script>

</body>
</html>
