<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Light</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  height: 100vh;
  background: black;
  transition: background 0.05s linear;
}
</style>
</head>

<body>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io("https://tabaska.onrender.com");

// 状態
let flashing = false;
let flashTimer = null;
let showWhite = false;

// 接続確認
socket.on("connect", () => {
  console.log("light connected:", socket.id);
});

// 通常色
socket.on("colorUpdate", (color) => {
  if (flashing) return;
  document.body.style.background = color;
});

// 🎲 ランダムカラー
function getRandomColor() {
  const r = Math.floor(Math.random() * 256);
  const g = Math.floor(Math.random() * 256);
  const b = Math.floor(Math.random() * 256);
  return `rgb(${r}, ${g}, ${b})`;
}

// ⚡ フラッシュ開始
socket.on("flash", () => {
  if (flashing) return;

  flashing = true;
  runFlashLoop();
});

// 🔁 ランダム＋白交互ループ
function runFlashLoop() {
  if (!flashing) return;

  if (showWhite) {
    document.body.style.background = "#ffffff";
  } else {
    document.body.style.background = getRandomColor();
  }

  showWhite = !showWhite;

  flashTimer = setTimeout(runFlashLoop, 120);
}

// 🛑 停止
socket.on("stopFlash", () => {
  flashing = false;
  showWhite = false;

  if (flashTimer) {
    clearTimeout(flashTimer);
    flashTimer = null;
  }

  document.body.style.background = "black";
});
</script>

</body>
</html>
