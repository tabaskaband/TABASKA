<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Light</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  height: 100vh;
  background: black;
  transition: background 0.2s ease;
}
</style>
</head>

<body>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io("https://tabaska.onrender.com");

// フラッシュ状態管理
let flashing = false;

// 接続確認
socket.on("connect", () => {
  console.log("light connected:", socket.id);
});

// 🎨 通常の色変更（フラッシュ中は無視）
socket.on("colorUpdate", (color) => {
  if (flashing) return;
  document.body.style.background = color;
});

// ⚡ フラッシュ開始
socket.on("flash", () => {
  flashing = true;

  document.body.style.background = "#ffffff";

  setTimeout(() => {
    if (flashing) {
      document.body.style.background = "#000000";
      flashing = false;
    }
  }, 450);
});

// 🛑 フラッシュ停止
socket.on("stopFlash", () => {
  flashing = false;
  document.body.style.background = "#000000";
});

</script>

</body>
</html>
