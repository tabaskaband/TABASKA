<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TABASKA Jr. メンバー募集</title>

  <style>
    :root {
      --bg: #0b0b0f;
      --card: #15151f;
      --accent: #ff0055;
      --text: #ffffff;
    }

    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-text-size-adjust: 100%;
      padding-bottom: 90px;
    }

    /* ===== FADE IN ANIMATION ===== */
    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .fade-in.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== HERO VIDEO BACKGROUND ===== */
    header {
      position: relative;
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 20px;
      overflow: hidden;
    }

    header video {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      min-width: 100%;
      min-height: 100%;
      object-fit: cover;
      z-index: 0;
      filter: brightness(0.45) contrast(1.1);
    }

    header::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.4), rgba(0,0,0,0.85));
      z-index: 1;
    }

    header h1, header p, header a {
      position: relative;
      z-index: 2;
    }

    header h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      margin: 0;
    }

    header p {
      margin-top: 16px;
      font-size: clamp(0.95rem, 3.5vw, 1.2rem);
      opacity: 0.9;
    }

    section {
      padding: 60px 16px;
      max-width: 980px;
      margin: auto;
    }

    h2 {
      font-size: clamp(1.4rem, 4.5vw, 2rem);
      margin-bottom: 18px;
      border-left: 5px solid var(--accent);
      padding-left: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--card);
      padding: 16px;
      border-radius: 12px;
    }

    .btn {
      margin-top: 24px;
      padding: 14px 26px;
      background: var(--accent);
      color: #fff;
      border-radius: 999px;
      font-size: 1rem;
      text-decoration: none;
      display: inline-block;
      transition: 0.25s;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .form-container {
      background: var(--card);
      padding: 14px;
      border-radius: 12px;
    }

    iframe {
      width: 100%;
      height: 80vh;
      border: none;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 30px 16px;
      font-size: 0.8rem;
      opacity: 0.6;
      background: #0a0a0a;
    }

    /* ===== FIXED CTA ===== */
    .fixed-cta {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(10px);
      padding: 12px;
      display: flex;
      justify-content: center;
      z-index: 999;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .fixed-cta a {
      width: 90%;
      text-align: center;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border-radius: 999px;
      text-decoration: none;
      font-weight: bold;
      animation: pulseGlow 1.8s infinite;
      box-shadow: 0 0 0 rgba(255,0,85,0.4);
    }

    /* ===== PULSE ANIMATION ===== */
    @keyframes pulseGlow {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255,0,85,0.5);
      }
      50% {
        transform: scale(1.03);
        box-shadow: 0 0 18px 6px rgba(255,0,85,0.25);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255,0,85,0);
      }
    }

    @media (min-width: 768px) {
      .fixed-cta {
        display: none;
      }
    }

    @media (max-width: 600px) {
      section { padding: 40px 14px; }
      .grid { grid-template-columns: 1fr; }
    }
      /* ===== 修正：スマホでヘッダーCTAを非表示 ===== */
    @media (max-width: 600px) {
      header .btn {
        display: none;
      }
    }
</style>
</head>
<body>

<header class="fade-in">
  <h1>TABASKA Jr.</h1>
  <p>音楽を“やってみたい”から“ステージへ”</p>

</header>

<section class="fade-in">
  <h2>TABASKA Jr.とは</h2>
  <p>音楽を愛する子どもたち・学生たちが実際のステージ経験を通して学ぶプロジェクトです。</p>
</section>

<section class="fade-in">
  <h2>活動内容</h2>
  <div class="grid">
    <div class="card">ステージ出演</div>
    <div class="card">アンサンブル演奏</div>
  </div>
</section>

<section class="fade-in">
  <h2>こんな人におすすめ</h2>
  <div class="grid">
    <div class="card">ステージに立ちたい</div>
    <div class="card">音楽を本気でやりたい</div>
    <div class="card">仲間と演奏したい</div>
    <div class="card">新しい挑戦がしたい</div>
  </div>
</section>

<section id="apply" class="fade-in">
  <h2>応募フォーム</h2>
  <p>フォームよりご応募ください。</p>

  <div class="form-container">
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfwszw26HwEFnrnR1jUzNbzMRpqnlGl-SFh8z93T3xYmd242w/viewform?usp=publish-editor"></iframe>
  </div>

  <a class="btn" href="mailto:tabaska.band@gmail.com">メールで応募する</a>
</section>

<footer class="fade-in">
  © TABASKA Jr. All Rights Reserved.
</footer>

<!-- 固定CTA -->
<div class="fixed-cta">
  <a href="#apply">今すぐ応募する</a>
</div>

<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('show');
      }
    });
  }, { threshold: 0.15 });

  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
</script>

</body>
</html>
